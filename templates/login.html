<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocVault — Kronos Systems</title>
<link rel="icon" type="image/png" href="/static/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background: #0F0E0C;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  position:relative;
  overflow:hidden;
}

/* background pattern */
body::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(37,99,235,.14) 0%, transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(14,165,233,.10) 0%, transparent 50%);
  pointer-events:none;
}
body::after {
  content:'';
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 39px,
    rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px
  ), repeating-linear-gradient(
    90deg, transparent, transparent 39px,
    rgba(255,255,255,.02) 39px, rgba(255,255,255,.02) 40px
  );
  pointer-events:none;
}

.card {
  background: #1A1916;
  border: 1px solid #2A2926;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  padding: 36px 32px;
  position:relative;
  z-index:1;
  animation: slideUp .4s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:none; }
}

.logo {
  display:flex; align-items:center; justify-content:center;
  margin-bottom:20px;
}
.logo-icon {
  width:60px; height:60px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
}
.logo-name { font-size:18px; font-weight:600; color:#F5F4F0; letter-spacing:-.3px; }

h2 {
  font-size:22px;
  font-weight:600;
  color:#F5F4F0;
  letter-spacing:-.4px;
  margin-bottom:6px;
}
.subtitle { font-size:13.5px; color:#6B6760; margin-bottom:28px; }

.field { margin-bottom:14px; }
.field label {
  display:block;
  font-size:12px;
  font-weight:500;
  color:#9B9793;
  margin-bottom:6px;
  letter-spacing:.3px;
  text-transform:uppercase;
}
.field input {
  width:100%;
  background:#111110;
  border:1px solid #2A2926;
  border-radius:8px;
  padding:10px 12px;
  color:#F5F4F0;
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border-color .18s;
}
.field input:focus { border-color:#2563EB; }
.field input::placeholder { color:#3D3C39; }

.pw-wrap { position:relative; }
.pw-toggle {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  font-size:15px; color:#6B6760;
  padding:2px;
  line-height:1;
}
.pw-toggle:hover { color:#9B9793; }

.error-msg {
  background:#3B1010;
  border:1px solid #7F1D1D;
  color:#FCA5A5;
  border-radius:8px;
  padding:10px 12px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
}
.error-msg.show { display:block; animation:shake .3s ease; }
@keyframes shake {
  0%,100%{transform:none}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

.btn-login {
  width:100%;
  padding:11px;
  background:#2563EB;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  transition:opacity .18s, transform .12s;
  margin-top:6px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:hover { opacity:.88; }
.btn-login:active { transform:scale(.98); }
.btn-login:disabled { opacity:.45; cursor:not-allowed; }

.spinner {
  width:16px; height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
.btn-login.loading .spinner { display:block; }
.btn-login.loading .btn-label { display:none; }
@keyframes spin { to{transform:rotate(360deg)} }

.footer {
  margin-top:24px;
  text-align:center;
  font-size:12px;
  color:#3D3C39;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="/static/logo.jpg" alt="Kronos Systems" style="width:60px;height:60px;object-fit:contain;border-radius:12px;">
  </div>

  <div style="text-align:center;margin-bottom:6px;">
    <div style="font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6366F1;margin-bottom:2px;">Kronos Systems</div>
    <h2 style="margin:0;">DocVault</h2>
  </div>
  <p class="subtitle">Faça login para acessar seus documentos.</p>

  <div class="error-msg" id="errMsg">Usuário ou senha incorretos. Tente novamente.</div>

  <form id="loginForm" method="post" action="/login" onsubmit="handleSubmit(event)">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="usuario" autocomplete="username" required placeholder="seu.usuario">
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="pw-wrap">
        <input type="password" name="senha" id="pwInput" autocomplete="current-password" required placeholder="••••••••">
        <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggle" aria-label="Mostrar senha">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="submitBtn">
      <div class="spinner"></div>
      <span class="btn-label">Entrar</span>
    </button>
  </form>

  <p class="footer">Kronos Systems &copy; 2025 · DocVault</p>
</div>

<script>
  // mostra erro se URL contém ?erro=1
  if (new URLSearchParams(location.search).get("erro") === "1") {
    document.getElementById("errMsg").classList.add("show");
  }

  function togglePw() {
    const inp = document.getElementById("pwInput");
    const btn = document.getElementById("pwToggle");
    inp.type   = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "👁" : "🙈";
  }

  function handleSubmit(e) {
    const btn = document.getElementById("submitBtn");
    btn.classList.add("loading");
    btn.disabled = true;
    // deixa o form prosseguir normalmente (POST)
  }
</script>
</body>
</html>
